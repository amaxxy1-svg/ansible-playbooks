---
- name: Install and start a service
  hosts: all
  become: yes

  vars:
    package_name: httpd
    service_name: httpd

  tasks:
    - name: Install Package
      package:
        name: "{{ package_name }}"
        state: present
    - name: Enable and Start the service
      service:
        name: "{{ service_name }}"
        state: started
        enabled: yes      
